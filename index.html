<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashEspañol — Learn Spanish Flashcards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="app-header">
      <h1>🇪🇸 FlashEspañol</h1>
      <p class="subtitle">Learn Spanish, one card at a time</p>
    </header>

    <!-- Progress bar + stats -->
    <section class="progress-section">
      <div class="progress-stats">
        <span id="known-count">0</span> known &nbsp;·&nbsp;
        <span id="learning-count">0</span> still learning &nbsp;·&nbsp;
        <span id="total-count">0</span> total
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
    </section>

    <!-- Mode toggle -->
    <section class="mode-toggle">
      <button id="mode-all-btn" class="mode-btn active">All Words</button>
      <button id="mode-practice-btn" class="mode-btn">Practice Still Learning</button>
    </section>

    <!-- Flashcard -->
    <main class="card-area">
      <div class="card-counter" id="card-counter"></div>

      <div class="card-scene" id="card-scene">
        <div class="card" id="flash-card">
          <div class="card-face card-front">
            <span class="card-label">Spanish</span>
            <span class="card-word" id="spanish-word"></span>
            <span class="flip-hint">Tap to reveal</span>
          </div>
          <div class="card-face card-back">
            <span class="card-label">English</span>
            <span class="card-word" id="english-word"></span>
            <span class="flip-hint">Tap to flip back</span>
          </div>
        </div>
      </div>

      <p id="empty-state" class="empty-state" hidden>
        🎉 Nothing left to practice here — great job! Switch to "All Words" to review everything.
      </p>

      <!-- Grading buttons -->
      <div class="grade-buttons">
        <button id="still-learning-btn" class="grade-btn learning-btn">Still Learning</button>
        <button id="know-it-btn" class="grade-btn known-btn">Know It ✓</button>
      </div>

      <!-- Navigation -->
      <div class="nav-buttons">
        <button id="prev-btn" class="nav-btn">← Previous</button>
        <button id="shuffle-btn" class="nav-btn">🔀 Shuffle</button>
        <button id="next-btn" class="nav-btn">Next →</button>
      </div>
    </main>

    <footer class="app-footer">
      <button id="reset-btn" class="reset-btn">Reset all progress</button>
    </footer>

  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
